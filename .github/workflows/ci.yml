name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/

  validate-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate install/uninstall scripts parse
        run: |
          python -m py_compile install_xmpp_plugin.py
          python -m py_compile uninstall_xmpp_plugin.py
          python -m py_compile hermes_xmpp_plugin_common.py

      - name: Test config mutation helpers
        run: |
          python -c "
          from hermes_xmpp_plugin_common import enable_plugin, disable_plugin, add_default_xmpp_config
          base = 'plugins:\\n  enabled:\\n    - foo\\n'
          assert 'platforms/xmpp' in enable_plugin(base)
          assert 'platforms/xmpp' not in disable_plugin(enable_plugin(base))
          result = add_default_xmpp_config(enable_plugin(''))
          assert 'xmpp:' in result
          print('Config mutations OK')
          "
